# Output configs.
--log=./simple_sampling.log
--log_level=error
--csv=./simple_sampling_arrival-40_TetriSched.csv

# Task configs.
--runtime_variance=0
#--override_release_policy=fixed
--override_arrival_period=40
--override_num_invocations=10

# Scheduler configs.
#--scheduler=TetriSched_Gurobi
--scheduler=TetriSched
#--scheduler=EDF
--scheduler_runtime=0
--enforce_deadlines
--retract_schedules
--release_taskgraphs
--noscheduler_enable_batching
--scheduler_log_times=0
--drop_skipped_tasks
# Not set for alibaba
#--scheduler_plan_ahead=7000
--scheduler_time_discretization=1

# Execution mode configs.
--execution_mode=json
--workload_profile_path=./profiles/workload/simple_sampling_workload.yaml
#--worker_profile_path=./profiles/workers/worker_1_machines_1_slots_profile.json
--worker_profile_path=profiles/workers/alibaba_cluster.yaml
